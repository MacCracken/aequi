name: Release

on:
  push:
    tags:
      - '[0-9][0-9][0-9][0-9].*'

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write

env:
  CARGO_TERM_COLOR: always

jobs:
  ci-gate:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  build-release:
    name: Build Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: ci-gate
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            arch: linux-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            arch: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            arch: windows-amd64
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build Tauri app
        run: cargo tauri build

      - name: Package release (Linux)
        if: runner.os == 'Linux'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_DIR="aequi-${VERSION}-${{ matrix.arch }}"
          mkdir -p "${RELEASE_DIR}"
          cp target/release/aequi "${RELEASE_DIR}/" 2>/dev/null || true
          cp target/release/bundle/deb/*.deb "${RELEASE_DIR}/" 2>/dev/null || true
          cp target/release/bundle/appimage/*.AppImage "${RELEASE_DIR}/" 2>/dev/null || true
          cp -r rules/ "${RELEASE_DIR}/rules/" 2>/dev/null || true
          cp LICENSE README.md CHANGELOG.md "${RELEASE_DIR}/"
          tar czf "${RELEASE_DIR}.tar.gz" "${RELEASE_DIR}"
          sha256sum "${RELEASE_DIR}.tar.gz" > "${RELEASE_DIR}.tar.gz.sha256"

      - name: Package release (macOS)
        if: runner.os == 'macOS'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_DIR="aequi-${VERSION}-${{ matrix.arch }}"
          mkdir -p "${RELEASE_DIR}"
          cp target/release/bundle/dmg/*.dmg "${RELEASE_DIR}/" 2>/dev/null || true
          cp LICENSE README.md CHANGELOG.md "${RELEASE_DIR}/"
          tar czf "${RELEASE_DIR}.tar.gz" "${RELEASE_DIR}"
          shasum -a 256 "${RELEASE_DIR}.tar.gz" > "${RELEASE_DIR}.tar.gz.sha256"

      - name: Package release (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_DIR="aequi-${VERSION}-${{ matrix.arch }}"
          mkdir -p "${RELEASE_DIR}"
          cp target/release/bundle/msi/*.msi "${RELEASE_DIR}/" 2>/dev/null || true
          cp target/release/bundle/nsis/*.exe "${RELEASE_DIR}/" 2>/dev/null || true
          cp LICENSE README.md CHANGELOG.md "${RELEASE_DIR}/"
          tar czf "${RELEASE_DIR}.tar.gz" "${RELEASE_DIR}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: |
            aequi-*.tar.gz
            aequi-*.tar.gz.sha256
          retention-days: 7

  generate-sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: ci-gate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-env
        with:
          cache-prefix: sbom

      - name: Install SBOM tools
        run: |
          cargo install cargo-cyclonedx --locked
          cargo install cargo-license --locked

      - name: Generate CycloneDX SBOM
        run: |
          cargo cyclonedx --format json --override-filename aequi-sbom
          cargo cyclonedx --format xml --override-filename aequi-sbom

      - name: Generate license report
        run: |
          cargo license --json > aequi-licenses.json
          cargo license > aequi-licenses.txt

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            aequi-sbom.*
            aequi-licenses.*
          retention-days: 90

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-release, generate-sbom]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          RAW=$(cat VERSION | tr -d '[:space:]')
          echo "version=${RAW}" >> "$GITHUB_OUTPUT"
          BUILD=$(echo "$RAW" | sed -E 's/^([0-9]{4})\.([0-9]{1,2})\.([0-9]{1,2})(-([0-9]+))?$/printf "%04d%02d%02d%s" \1 \2 \3 \5/e')
          echo "build=${BUILD}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --no-decorate)
          else
            CHANGELOG=$(git log --oneline --no-decorate "${PREV_TAG}..HEAD")
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Aequi ${{ steps.version.outputs.version }}
          body: |
            ## Aequi ${{ steps.version.outputs.version }}

            ### Changes
            ${{ steps.changelog.outputs.changelog }}

            ### Downloads
            | Platform | Archive |
            |----------|---------|
            | Linux amd64 | `aequi-${{ steps.version.outputs.version }}-linux-amd64.tar.gz` |
            | macOS arm64 | `aequi-${{ steps.version.outputs.version }}-macos-arm64.tar.gz` |
            | Windows amd64 | `aequi-${{ steps.version.outputs.version }}-windows-amd64.tar.gz` |

            ### Verification
            Each archive includes a `.sha256` checksum file.

            ---
            *Estimates are informational only. Aequi does not provide tax advice.*
          files: |
            release-artifacts/release-linux-amd64/*
            release-artifacts/release-macos-arm64/*
            release-artifacts/release-windows-amd64/*
            release-artifacts/sbom/*
          prerelease: true
